# Tests + docs text sanity (same pattern as easy-aso; no PyPI / no package build).

name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project (runtime + dev extras for tests)
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Build combined docs text (sanity; same script as Docs PDF workflow)
        run: |
          python scripts/build_docs_pdf.py --no-pdf

      - name: Run tests
        run: pytest tests/ -v --tb=short
