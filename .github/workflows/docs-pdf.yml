name: Docs PDF

on:
  push:
    branches: [main, master, develop]
    paths:
      - "docs/**"
      - "scripts/build_docs_pdf.py"
      - ".github/workflows/docs-pdf.yml"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: docs-pdf-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pandoc and WeasyPrint system libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pandoc \
            libcairo2 libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf-2.0-0 \
            libffi-dev shared-mime-info

      - name: Install Python deps
        run: pip install pyyaml weasyprint

      - name: Build docs PDF and text bundle
        run: python scripts/build_docs_pdf.py --pdf-engine=weasyprint

      - name: Open PR with updated docs bundle (if changed)
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/docs-pdf-refresh
          commit-message: "chore(docs): regenerate docs PDF and text bundle"
          title: "chore(docs): regenerate docs PDF and text bundle"
          body: |
            Automated refresh from `.github/workflows/docs-pdf.yml`.

            Merge this PR to keep generated docs artifacts current.
          add-paths: |
            pdf/diy-bacnet-server-docs.pdf
            pdf/diy-bacnet-server-docs.txt
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          delete-branch: true
