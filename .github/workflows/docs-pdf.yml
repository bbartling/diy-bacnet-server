# Regenerate pdf/diy-bacnet-server-docs.pdf (+ .txt) when docs or the builder change.
# Publishes artifacts only (no bot PR branch/PR creation).

name: Docs PDF

on:
  push:
    branches: [main, master, develop]
    paths:
      - "docs/**"
      - "scripts/build_docs_pdf.py"
      - ".github/workflows/docs-pdf.yml"
      - ".github/workflows/docs-pages.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-pdf-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pandoc and WeasyPrint system libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pandoc \
            libcairo2 libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf-2.0-0 \
            libffi-dev shared-mime-info

      - name: Install Python deps
        run: pip install pyyaml weasyprint

      - name: Build docs PDF and text bundle
        run: python scripts/build_docs_pdf.py --pdf-engine=weasyprint

      - name: Upload PDF and text bundle (always)
        uses: actions/upload-artifact@v4
        with:
          name: docs-pdf-${{ github.run_id }}
          path: |
            pdf/diy-bacnet-server-docs.pdf
            pdf/diy-bacnet-server-docs.txt
