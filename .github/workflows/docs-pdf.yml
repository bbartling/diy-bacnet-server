# Regenerate pdf/diy-bacnet-server-docs.pdf (+ .txt) when docs or the builder change.
# Opens a PR when artifacts change (same pattern as open-fdd / easy-aso).

name: Docs PDF

on:
  push:
    branches: [main, master, develop]
    paths:
      - "docs/**"
      - "scripts/build_docs_pdf.py"
      - ".github/workflows/docs-pdf.yml"
      - ".github/workflows/docs-pages.yml"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: docs-pdf-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - name: Install pandoc and WeasyPrint system libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pandoc \
            libcairo2 libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf-2.0-0 \
            libffi-dev shared-mime-info

      - name: Install Python deps
        run: pip install pyyaml weasyprint

      - name: Build docs PDF and text bundle
        run: python scripts/build_docs_pdf.py --pdf-engine=weasyprint

      - name: Upload PDF and text bundle (always)
        uses: actions/upload-artifact@v4
        with:
          name: docs-pdf-${{ github.run_id }}
          path: |
            pdf/diy-bacnet-server-docs.pdf
            pdf/diy-bacnet-server-docs.txt

      - name: Open PR with updated docs bundle (if changed)
        id: docs_pdf_pr
        continue-on-error: true
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/docs-pdf-refresh
          commit-message: "chore(docs): regenerate docs PDF and text bundle"
          title: "chore(docs): regenerate docs PDF and text bundle"
          body: |
            Automated refresh from **Docs PDF** workflow ([`.github/workflows/docs-pdf.yml`](.github/workflows/docs-pdf.yml)).

            Merge when ready so `pdf/diy-bacnet-server-docs.pdf` and `pdf/diy-bacnet-server-docs.txt` stay current.
          add-paths: |
            pdf/diy-bacnet-server-docs.pdf
            pdf/diy-bacnet-server-docs.txt
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          delete-branch: true

      - name: Warn when PR automation is blocked
        if: steps.docs_pdf_pr.outcome == 'failure'
        run: |
          echo '::warning title=Docs PDF PR blocked::Could not open a PR (repo/org may disallow Actions-initiated pull requests). Enable Settings → Actions → General → Allow GitHub Actions to create and approve pull requests. PDF and .txt are still uploaded as workflow artifacts.'
