title: "DIY BACnet Server"
description: "BACnet/IP + JSON-RPC edge gateway — bacpypes3, Docker, optional Modbus TCP and MQTT."
baseurl: "/diy-bacnet-server"
url: "https://bbartling.github.io"

remote_theme: just-the-docs/just-the-docs
color_scheme: "light"

plugins:
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-seo-tag

aux_links:
  "GitHub": "https://github.com/bbartling/diy-bacnet-server"
  "Published docs": "https://bbartling.github.io/diy-bacnet-server/"

footer_content: "MIT · <a href=\"https://github.com/bbartling/diy-bacnet-server\">diy-bacnet-server</a> · <a href=\"https://bbartling.github.io/diy-bacnet-server/\">GitHub Pages</a>"

heading_anchors: true

search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: true
