# Jekyll site (GitHub Pages) — same stack as open-fdd / easy-aso: Just the Docs remote theme
title: "DIY BACnet Server"
description: "BACnet/IP + JSON-RPC edge microservice for Docker-based deployments; optional Modbus TCP and MQTT."
baseurl: "/diy-bacnet-server"
url: "https://bbartling.github.io"

remote_theme: just-the-docs/just-the-docs
color_scheme: "light"

plugins:
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-seo-tag

aux_links:
  "GitHub": "https://github.com/bbartling/diy-bacnet-server"

footer_content: "MIT · diy-bacnet-server · BACnet/IP + JSON-RPC gateway"

heading_anchors: true

search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: true
