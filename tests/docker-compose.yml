# No 'version' key (obsolete in Compose V2).
# Uses host port 18080 so tests don't fail when something else is on 8080.
services:
  bacnet-server:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: diy-bacnet-server-test
    networks:
      - bacnet-network
    cap_add:
      - NET_ADMIN
    stdin_open: true
    tty: true
    environment:
      PYTHONPATH: /app
      HVAC_SERVER_POINTS_CSV: /app/hvac_server_points.csv
    command: >
      python3 -u -m bacpypes_server.main
        --name TestServer
        --instance 987654
        --public
    ports:
      - "18080:8080"
      - "47809:47808/udp"

networks:
  bacnet-network:
    driver: bridge